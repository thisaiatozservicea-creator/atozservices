<script>


// =============================
// FIREBASE CONFIG
// =============================


const firebaseConfig = {




authDomain:"notificatin.firebaseapp.com",


databaseURL:"https://notificatin-default-rtdb.firebaseio.com",


projectId:"notificatin",


storageBucket:"notificatin.firebasestorage.app",


messagingSenderId:"254649810281",


appId:"1:254649810281:web:bc659be4ac62712e57d1f8"


};





firebase.initializeApp(firebaseConfig);




const db=firebase.database();








// =============================
// GET ADMIN RADIUS LIVE
// =============================


db.ref("settings/serviceRadius")

.on("value",function(snapshot){



let r=snapshot.val();





if(r){



document.getElementById("radius").innerHTML=r;



calculateDistance();



}



});









// =============================
// DISTANCE CALCULATION
// =============================


function calculateDistance(){



let customerLat=

Number(localStorage.getItem("customerLat"));



let customerLng=

Number(localStorage.getItem("customerLng"));





let officeLat=

Number(localStorage.getItem("officeLat"));



let officeLng=

Number(localStorage.getItem("officeLng"));







if(


!customerLat ||

!customerLng ||

!officeLat ||

!officeLng


){



document.getElementById("distance").innerHTML="--";



return;


}







let d=getDistance(



customerLat,



customerLng,



officeLat,



officeLng



);






document.getElementById("distance").innerHTML=

d.toFixed(2);



}









// =============================
// DISTANCE FUNCTION
// =============================


function getDistance(lat1,lon1,lat2,lon2){



let R=6371;





let dLat=

(lat2-lat1)

*

Math.PI

/

180;





let dLon=

(lon2-lon1)

*

Math.PI

/

180;







let a=


Math.sin(dLat/2)**2



+



Math.cos(lat1*Math.PI/180)



*



Math.cos(lat2*Math.PI/180)



*



Math.sin(dLon/2)**2;







let c=



2*Math.atan2(



Math.sqrt(a),



Math.sqrt(1-a)



);







return R*c;



}






calculateDistance();
