<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>A TO Z Services Location Check</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">


<style>


*{

box-sizing:border-box;

font-family:'Poppins',Arial,sans-serif;

}



body{

margin:0;

min-height:100vh;

position:relative;

background:#f5f7fb;

}



/* BACKGROUND IMAGE BLUR */


body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:

linear-gradient(

rgba(255,255,255,.45),

rgba(255,255,255,.45)

),

url("bs.png");


background-size:cover;

background-position:center;

filter:blur(3px);

transform:scale(1.05);

z-index:-1;

}





/* HEADER */


.topbar{

background:

linear-gradient(

135deg,

#facc15,

#f59e0b

);


padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

font-weight:800;

box-shadow:

0 5px 15px rgba(0,0,0,.15);

}



.logo-text{

font-size:18px;

color:#111827;

}



.topbar button{

background:#111827;

color:white;

border:none;

padding:8px 14px;

border-radius:10px;

font-weight:600;

cursor:pointer;

}




/* MAIN */


.container{

max-width:520px;

margin:auto;

padding:20px;

padding-top:40px;

}




/* LOCATION CARD */


.card{

position:relative;

background:rgba(255,255,255,.78);

backdrop-filter:blur(15px);

padding:22px;

border-radius:25px;

box-shadow:

0 15px 35px rgba(0,0,0,.2);

overflow:hidden;

animation:

floatCard 4s ease-in-out infinite;

}




/* ANIMATED OUTLINE */


.card::before{

content:"";
position:absolute;

inset:0;

padding:2px;

border-radius:25px;


background:

linear-gradient(

90deg,

#facc15,

#38bdf8,

#f59e0b,

#22c55e,

#facc15

);



background-size:300% 300%;


animation:

borderMove 4s linear infinite;



-webkit-mask:

linear-gradient(#fff 0 0) content-box,

linear-gradient(#fff 0 0);


-webkit-mask-composite:xor;

mask-composite:exclude;

pointer-events:none;

}





@keyframes borderMove{


0%{

background-position:0% 50%;

}


50%{

background-position:100% 50%;

}


100%{

background-position:0% 50%;

}


}





@keyframes floatCard{


0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-7px);

}


}





h2{

margin:0;

text-align:center;

font-size:24px;

color:#111827;

}



p{

font-size:14px;

text-align:center;

color:#555;

line-height:1.5;

}





/* INPUT */


input{

width:100%;

padding:13px;

margin-top:12px;

border-radius:12px;

border:1px solid #ddd;

font-size:15px;

outline:none;

}





/* BUTTON */


.btn{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:12px;

font-weight:700;

font-size:15px;

cursor:pointer;

}



.search{

background:#facc15;

}


.gps{

background:#111827;

color:white;

}


.check{

background:#f59e0b;

color:white;

}





/* MAP */


#map{

height:320px;

margin-top:18px;

border-radius:18px;

overflow:hidden;

box-shadow:

0 8px 20px rgba(0,0,0,.15);

}
@media(max-width:600px){


body::before{

filter:blur(3px);

}


.topbar{

flex-direction:column;

gap:10px;

padding:12px;

border-radius:0 0 20px 20px;

background:rgba(250,204,21,.85);

backdrop-filter:blur(12px);

}



.logo-text{

font-size:15px;

}



.topbar button{

font-size:10px;

padding:6px 10px;

border-radius:20px;

}



.container{

padding:10px;

padding-top:55px;

}



.card{

width:80%;

margin:auto;

padding:14px;

border-radius:18px;

}



.card::before{

border-radius:18px;

}



h2{

font-size:16px;

}



p{

font-size:11px;

}



input{

padding:9px;

font-size:12px;

}



.btn{

padding:9px;

font-size:11px;

margin-top:8px;

}



#map{

height:160px;

border-radius:12px;

}



}



/* DESKTOP */

@media(min-width:1000px){


.container{

padding-top:60px;

}


}



</style>

</head>


<body>


<div class="topbar">


<div class="logo-text">

📍 A TO Z SERVICES

</div>


<div>


<button onclick="goHome()">

Home

</button>


<button onclick="viewWebsite()" style="margin-left:5px;">

Website

</button>


</div>


</div>





<div class="container">


<div class="card">


<h2>

Check Service Availability

</h2>



<p>

Select your location or PIN code to check our service availability.

</p>



<input id="pincode" placeholder="Enter PIN Code">



<button class="btn search" onclick="searchPin()">

🔍 Search PIN

</button>



<button class="btn gps" onclick="getLocation()">

📍 Use My Location

</button>




<div id="map"></div>




<button class="btn check" onclick="checkService()">

✅ Check Availability

</button>



</div>


</div>





<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>



<script>


function goHome(){

window.location.href="index.html";

}





function viewWebsite(){


localStorage.removeItem("customerLocation");

localStorage.removeItem("customerLat");

localStorage.removeItem("customerLng");

localStorage.removeItem("locationVerified");


localStorage.setItem(
"visitorMode",
"true"
);


window.location.href="customer-dashboard demo.html";


}





// FIREBASE


const firebaseConfig={




authDomain:"notificatin.firebaseapp.com",

databaseURL:"https://notificatin-default-rtdb.firebaseio.com",

projectId:"notificatin",

storageBucket:"notificatin.firebasestorage.app",

messagingSenderId:"254649810281",

appId:"1:254649810281:web:bc659be4ac62712e57d1f8"


};



firebase.initializeApp(firebaseConfig);


const db=firebase.database();





// MAP


let map=L.map("map").setView(

[20.5937,78.9629],

5

);


L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20
}).addTo(map);





let marker=null;

let userLat=null;

let userLng=null;





// SHOW LOCATION


function showLocation(lat,lng){


userLat=Number(lat);

userLng=Number(lng);



localStorage.setItem(
"customerLat",
userLat
);


localStorage.setItem(
"customerLng",
userLng
);


localStorage.setItem(
"customerLocation",
"fixed"
);



map.setView(

[userLat,userLng],

13

);



if(marker){

map.removeLayer(marker);

}



marker=L.marker(

[userLat,userLng]

)

.addTo(map)

.bindPopup(

"📍 Your Location"

)

.openPopup();



}





// PIN SEARCH







function searchPin(){

let pin=document.getElementById("pincode").value.trim();

if(pin===""){
alert("Enter PIN Code");
return;
}


fetch(
"https://photon.komoot.io/api/?q="+pin+", India"
)

.then(res=>res.json())

.then(data=>{


if(!data.features || data.features.length===0){

alert("PIN Location Not Found");

return;

}



let place=data.features[0].geometry.coordinates;


let lng=place[0];

let lat=place[1];


showLocation(lat,lng);


})

.catch(error=>{

console.log(error);

alert("Search failed. Check internet");

});


}

then(res=>res.json())

.then(data=>{


if(
!data[0] ||
data[0].Status!="Success"
){

alert("PIN not found");
return;

}


let post=data[0].PostOffice[0];


let city=post.District;
let state=post.State;


fetch(
"https://geocode.maps.co/search?q="+city+","+state+",India"
)

.then(res=>res.json())

.then(location=>{


if(location.length==0){

alert("Map location not found");
return;

}


showLocation(

parseFloat(location[0].lat),

parseFloat(location[0].lon)

);


});


})

.catch(()=>{

alert("Search failed");

});







// DISTANCE CALCULATION


function getDistance(

lat1,

lon1,

lat2,

lon2

){


let R=6371;



let dLat=

(lat2-lat1)*Math.PI/180;



let dLon=

(lon2-lon1)*Math.PI/180;



let a=


Math.sin(dLat/2)*

Math.sin(dLat/2)



+

Math.cos(lat1*Math.PI/180)*

Math.cos(lat2*Math.PI/180)



*

Math.sin(dLon/2)*

Math.sin(dLon/2);



let c=

2*

Math.atan2(

Math.sqrt(a),

Math.sqrt(1-a)

);



return R*c;


}




function getLocation(){

if(!navigator.geolocation){

alert("GPS not supported");
return;

}


navigator.geolocation.getCurrentPosition(

function(position){

showLocation(

position.coords.latitude,

position.coords.longitude

);

},

function(){

alert("Please allow location permission");

},

{
enableHighAccuracy:true,
timeout:10000
}

);


}


// CHECK SERVICE


function checkService(){



if(userLat===null || userLng===null){


alert(

"Please select your location first"

);


return;


}






let officeLat=


Number(localStorage.getItem("officeLat"))

||8.3416018;






let officeLng=


Number(localStorage.getItem("officeLng"))

||77.8806706;







db.ref("settings/serviceRadius")

.once("value")

.then(function(snapshot){



let radius=

Number(snapshot.val())

||20;







let distance=


getDistance(

userLat,

userLng,

officeLat,

officeLng

);






localStorage.setItem(

"customerDistance",

distance.toFixed(2)

);






if(distance<=radius){



localStorage.setItem(

"locationVerified",

"yes"

);






showSuccessPopup();






setTimeout(function(){



window.location.href=

"customer-dashboard.html";



},2500);






}

else{



window.location.href=

"service-not-available.html";



}





});



}


// SUCCESS POPUP


function showSuccessPopup(){


let box=document.createElement("div");



box.className="successBox";



box.innerHTML=`

<h1>

🎉

</h1>


<h2>

Congratulations!

</h2>


<p>

Your location is available.

</p>


<p>

A TO Z Services is ready to serve you.

</p>

`;



document.body.appendChild(box);



setTimeout(function(){


box.remove();


},2500);



}



</script>




<style>


/* SUCCESS POPUP */


.successBox{


position:fixed;


top:50%;


left:50%;


transform:

translate(-50%,-50%);


width:90%;


max-width:380px;


background:

rgba(255,255,255,.85);


backdrop-filter:blur(15px);


padding:35px;


border-radius:30px;


text-align:center;


box-shadow:

0 25px 60px rgba(0,0,0,.35);


z-index:9999;


animation:

popupShow .5s ease;


border:2px solid #facc15;


}





.successBox h1{


font-size:55px;


margin:0;


}





.successBox h2{


color:#16a34a;


font-size:25px;


margin:10px;


}





.successBox p{


font-size:14px;


color:#555;


}





@keyframes popupShow{


0%{


opacity:0;


transform:

translate(-50%,-50%)

scale(.5);


}



70%{


transform:

translate(-50%,-50%)

scale(1.05);


}



100%{


opacity:1;


transform:

translate(-50%,-50%)

scale(1);


}



}







@media(max-width:600px){



.successBox{


width:82%;


padding:22px;


border-radius:22px;


}



.successBox h1{


font-size:38px;


}



.successBox h2{


font-size:18px;


}



.successBox p{


font-size:11px;


}



}



</style>




</body>

</html>
