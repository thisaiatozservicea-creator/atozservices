<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
A TO Z Admin Dashboard
</title>


<style>


*{

box-sizing:border-box;

font-family:'Segoe UI',Arial,sans-serif;

}



body{

margin:0;

background:#f1f5f9;

color:#111827;

}



/* LOGIN CHECK PAGE */


.loading{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

font-weight:800;

color:#2563eb;

}






/* HEADER */


.header{


height:75px;

background:linear-gradient(135deg,#facc15,#f59e0b);

display:flex;

align-items:center;

justify-content:center;

font-size:25px;

font-weight:900;

box-shadow:0 8px 25px rgba(0,0,0,.15);

}





.menu-btn{


display:none;

position:fixed;

top:15px;

left:15px;

z-index:9999;

background:#111827;

color:white;

border:none;

padding:12px 16px;

border-radius:12px;

font-size:20px;

cursor:pointer;


}





/* MAIN */


.container{

display:flex;

}







/* SIDEBAR */


.sidebar{


position:fixed;

top:75px;

left:0;

height:calc(100vh - 75px);

width:250px;

background:#111827;

padding:20px;

transition:.3s;

z-index:1000;


}




.sidebar h2{


color:white;

text-align:center;

margin-bottom:30px;


}




.sidebar button{


width:100%;

padding:15px;

margin-bottom:12px;

border:none;

border-radius:15px;

background:#1f2937;

color:white;

font-size:15px;

font-weight:700;

cursor:pointer;

transition:.3s;


}




.sidebar button:hover{


background:#374151;

transform:translateX(5px);


}




.sidebar .active{


background:#facc15;

color:#000;


}






/* MAIN CONTENT */


.main{


margin-left:250px;

width:100%;

padding:25px;


}





.box{


background:white;

padding:25px;

border-radius:22px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

margin-bottom:25px;


}





h2{

margin-top:0;

color:#0f172a;

}






/* DASHBOARD CARD */


.dashboard-card{


background:white;

padding:25px;

border-radius:22px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}





/* POPUP */


.popup{


position:fixed;

right:25px;

top:25px;

background:white;

padding:18px 25px;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.25);

z-index:9999;

font-weight:800;

animation:popup .4s;


}



@keyframes popup{


from{

opacity:0;

transform:translateX(100px);

}


to{

opacity:1;

transform:translateX(0);

}


}







/* MOBILE */


@media(max-width:900px){



.menu-btn{

display:block;

}



.sidebar{


left:-270px;


}



.sidebar.show{


left:0;


}



.main{


margin-left:0;

padding:15px;


}



.header{


font-size:18px;

padding-left:50px;


}


}



</style>


</head>





<body>



<div id="loading" class="loading">

Checking Admin Login...

</div>





<div id="app" style="display:none;">






<button class="menu-btn" onclick="toggleMenu()">

☰

</button>







<div class="header">

🛠 A TO Z SERVICES ADMIN PANEL

</div>







<div class="container">






<div class="sidebar" id="sidebar">


<h2>

ADMIN

</h2>





<button class="active">

📢 Live Bookings

</button>





<button onclick="logout()">

🚪 Logout

</button>





</div>









<div class="main">






<div class="box">


<h2>

📢 Live Booking Notifications

</h2>




<div id="list">


</div>



</div>
<!-- ==========================
     BOOKING CARD STYLE
========================== -->


<style>


.booking-card{


background:white;

padding:22px;

border-radius:22px;

margin-bottom:18px;

box-shadow:0 10px 25px rgba(0,0,0,.10);

border-left:6px solid #2563eb;

animation:slide .4s;


}



@keyframes slide{


from{

opacity:0;

transform:translateY(20px);

}


to{

opacity:1;

transform:translateY(0);

}


}





.booking-head{


display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;


}





.badge{


padding:7px 15px;

border-radius:20px;

font-size:12px;

font-weight:800;

background:#2563eb;

color:white;


}




.status{


padding:6px 14px;

border-radius:20px;

font-size:12px;

font-weight:800;


}



.NEW{


background:#dbeafe;

color:#1d4ed8;


}



.PENDING{


background:#fef3c7;

color:#b45309;


}



.COMPLETED{


background:#dcfce7;

color:#15803d;


}





.booking-info{


line-height:1.8;

margin-top:15px;


}





@media(max-width:600px){



.booking-head{

flex-direction:column;

align-items:flex-start;


}


}



</style>







<script type="module">



// ================= FIREBASE =================


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";



import { getDatabase, ref, onChildAdded }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";





const firebaseConfig = {



authDomain:"notificatin.firebaseapp.com",

databaseURL:"https://notificatin-default-rtdb.firebaseio.com",

projectId:"notificatin",

storageBucket:"notificatin.firebasestorage.app",

messagingSenderId:"254649810281",

appId:"1:254649810281:web:bc659be4ac62712e57d1f8",

measurementId:"G-QZMTNTS9RK"


};





const app = initializeApp(firebaseConfig);


const db = getDatabase(app);





const list=document.getElementById("list");






// ================= SOUND =================


function playSound(){


let audio=new Audio(
"https://www.soundjay.com/buttons/sounds/beep-07.mp3"
);


audio.volume=.5;


audio.play().catch(()=>{});


}








// ================= NOTIFICATION =================


if(
"Notification" in window &&
Notification.permission!=="granted"
){


Notification.requestPermission();


}









// ================= LIVE BOOKING =================


onChildAdded(
ref(db,"bookings"),
(data)=>{


let d=data.val();



if(!d)return;





let card=document.createElement("div");


card.className="booking-card";





card.innerHTML=`



<div class="booking-head">


<div class="badge">

NEW BOOKING

</div>



<span class="status ${d.status || "NEW"}">

${d.status || "NEW"}

</span>



</div>






<div class="booking-info">



👤 
<b>
${d.name || "N/A"}
</b>

<br>




📞 
${d.phone || "N/A"}

<br>




🧰 
${d.service || "N/A"}

<br>




📅 
${d.datetime || "N/A"}

<br>




🏠 
${d.address || "N/A"}

<br>




📝 
${d.issue || "No Issue"}



</div>


`;





list.prepend(card);





// SOUND ALERT

playSound();






// BROWSER ALERT


if(Notification.permission==="granted"){



new Notification(
"New Booking Received",
{

body:
`${d.name} booked ${d.service}`


}

);



}





popup("🔔 New Booking Received");





}

);






</script>
<script>


// ===============================
// LOGIN CHECK
// ===============================


window.onload=function(){


let login=
localStorage.getItem("adminLogin");



if(login==="true"){


document.getElementById("loading")
.style.display="none";



document.getElementById("app")
.style.display="block";



}

else{


window.location.href="admin-login.html";


}



};







// ===============================
// POPUP SYSTEM
// ===============================


function popup(msg){



let p=document.createElement("div");


p.className="popup";


p.innerHTML=msg;



document.body.appendChild(p);




setTimeout(()=>{


p.remove();


},2500);



}









// ===============================
// MOBILE MENU
// ===============================



function toggleMenu(){



document
.getElementById("sidebar")
.classList.toggle("show");



}









// ===============================
// LOGOUT
// ===============================


function logout(){



localStorage.removeItem(
"adminLogin"
);



popup("🚪 Logged Out");



setTimeout(()=>{


window.location.href="admin-login.html";


},1000);



}



</script>





</div>

</div>

</div>



</body>

</html>
