<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
A TO Z Admin Login
</title>


<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;

}



body{


min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,#fff7cc,#dbeafe);

overflow:hidden;

padding:20px;


}



/* BACKGROUND CIRCLES */


body::before,
body::after{


content:"";

position:absolute;

border-radius:50%;

filter:blur(10px);

z-index:-1;


}



body::before{


width:300px;

height:300px;

background:#facc15;

top:-100px;

left:-100px;


}



body::after{


width:350px;

height:350px;

background:#3b82f6;

bottom:-150px;

right:-120px;


}






/* LOGIN CARD */


.login-box{


width:390px;

max-width:100%;

background:rgba(255,255,255,.85);

backdrop-filter:blur(15px);

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:
0 20px 50px rgba(0,0,0,.18);

border-top:6px solid #facc15;


animation:show .5s;


}



@keyframes show{


from{

opacity:0;

transform:translateY(40px);

}


to{

opacity:1;

transform:translateY(0);

}


}





.logo{


font-size:45px;

margin-bottom:10px;


}



h2{


font-size:26px;

font-weight:800;

color:#111827;


}



p{


color:#64748b;

font-size:14px;

margin:10px 0 25px;


}







.input-box{


position:relative;


}





input{


width:100%;

padding:14px;

margin:10px 0;

border-radius:14px;

border:1px solid #d1d5db;

font-size:14px;

outline:none;


}



input:focus{


border-color:#facc15;

box-shadow:0 0 10px rgba(250,204,21,.4);


}





.eye{


position:absolute;

right:15px;

top:25px;

cursor:pointer;

font-size:18px;


}






button{


width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:15px;

background:#facc15;

font-size:16px;

font-weight:800;

cursor:pointer;

transition:.3s;


}



button:hover{


transform:scale(1.04);

background:#eab308;


}



button:disabled{


opacity:.6;

cursor:not-allowed;


}







.back{


margin-top:20px;

font-size:13px;


}



.back a{


color:#2563eb;

font-weight:700;

text-decoration:none;


}








/* POPUP */


.popup{


position:fixed;

top:25px;

right:25px;

background:white;

padding:18px 25px;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

font-weight:700;

animation:popup .4s;

z-index:999;


}




@keyframes popup{


from{

transform:translateX(100px);

opacity:0;

}


to{

transform:translateX(0);

opacity:1;

}


}





@media(max-width:500px){


.login-box{


padding:25px;

border-radius:20px;


}


h2{

font-size:22px;

}



}


</style>


</head>



<body>




<div class="login-box">


<div class="logo">

🛠

</div>


<h2>

A TO Z SERVICES

</h2>


<p>

Admin Login Portal

</p>





<input 
id="email"
placeholder="Email / Username">






<div class="input-box">


<input 
id="password"
type="password"
placeholder="Password">



<span class="eye" onclick="showPassword()">

👁

</span>


</div>







<button 
id="loginBtn"
onclick="login()">

Login

</button>





<div class="back">

← 
<a href="index.html">

Back To Home

</a>

</div>




</div>









<script>



function popup(msg){


let p=document.createElement("div");


p.className="popup";


p.innerHTML=msg;


document.body.appendChild(p);



setTimeout(()=>{


p.remove();


},2500);



}







function showPassword(){


let pass=document.getElementById("password");


if(pass.type==="password"){


pass.type="text";


}

else{


pass.type="password";


}


}








function login(){



let btn=document.getElementById("loginBtn");


let email=
document.getElementById("email").value.trim();



let password=
document.getElementById("password").value.trim();






let admin1Email="serviceatoz72@gmail.com";

let admin1Pass="8124906869";



let admin2Email="muthu";

let admin2Pass="muthu";





if(email=="" || password==""){


popup("⚠️ Fill all details");


return;


}





btn.disabled=true;

btn.innerHTML="Checking...";







if(

(email===admin1Email && password===admin1Pass)

||

(email===admin2Email && password===admin2Pass)

){



popup("✅ Login Successful");



localStorage.setItem(
"adminLogin",
"true"
);





setTimeout(()=>{


window.location.href="admin-dashboard.html";


},1000);



}



else{


popup("❌ Invalid Login");

btn.disabled=false;

btn.innerHTML="Login";


}



}





</script>


</body>

</html>
