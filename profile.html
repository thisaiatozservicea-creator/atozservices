<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
A TO Z Services | Customer Profile
</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<style>


*{

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}



body{

margin:0;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:10px;

background:

linear-gradient(

135deg,

#fff7cc,

#dbeafe

);

}





.profile-card{


width:100%;

max-width:360px;


background:

rgba(255,255,255,.35);


backdrop-filter:blur(20px);


border:

1px solid rgba(255,255,255,.6);


border-radius:28px;


padding:25px 20px;


box-shadow:

0 20px 50px rgba(0,0,0,.2);


animation:show .5s;



}




@keyframes show{


from{

opacity:0;

transform:translateY(30px);

}


to{

opacity:1;

transform:translateY(0);

}


}





.profile-icon{


width:70px;

height:70px;

margin:auto;


border-radius:50%;


display:flex;

align-items:center;

justify-content:center;


font-size:35px;


background:

linear-gradient(

135deg,

#facc15,

#f59e0b

);


box-shadow:

0 10px 25px rgba(250,204,21,.5);



}



h1{


text-align:center;

font-size:22px;

font-weight:800;

margin:12px 0 5px;


}



.sub{


text-align:center;

font-size:12px;

color:#64748b;

margin-bottom:18px;


}





.input-box{


margin-bottom:10px;


}



label{


font-size:11px;

font-weight:700;

color:#334155;


}



input,
textarea{


width:100%;


padding:10px;


margin-top:5px;


border:none;


outline:none;


border-radius:14px;


background:

rgba(255,255,255,.8);


font-size:12px;



box-shadow:

0 5px 15px rgba(0,0,0,.08);



}



textarea{


height:70px;

resize:none;


}




input:focus,
textarea:focus{


background:white;


box-shadow:

0 0 0 2px #facc15;


}





button{


width:100%;


padding:12px;


border:none;


border-radius:14px;


margin-top:10px;


font-weight:800;


cursor:pointer;


font-size:13px;



}



.save{


background:

linear-gradient(

135deg,

#facc15,

#f59e0b

);



}



.skip{


background:#111827;

color:white;


}



.message{


display:none;


text-align:center;


margin-top:12px;


font-size:12px;


font-weight:700;


color:#16a34a;


}





@media(max-width:400px){



.profile-card{


max-width:320px;

padding:20px 15px;


}



.profile-icon{


width:55px;

height:55px;

font-size:28px;


}



h1{


font-size:18px;


}



input,
textarea{


font-size:11px;


}



button{


font-size:12px;

padding:10px;


}



}



</style>


</head>




<body>





<div class="profile-card">



<div class="profile-icon">

👤

</div>



<h1>

Customer Profile

</h1>




<div class="sub">

Save your details for faster booking

</div>





<div class="input-box">

<label>
Name *
</label>


<input id="name" placeholder="Enter your name">


</div>






<div class="input-box">


<label>

Phone *

</label>


<input 
id="phone"
type="tel"
maxlength="10"
placeholder="Enter mobile number">


</div>






<div class="input-box">


<label>

Email (Optional)

</label>


<input 
id="email"
type="email"
placeholder="Enter email">


</div>






<div class="input-box">


<label>

Address *

</label>



<textarea

id="address"

placeholder="Enter full address">

</textarea>



</div>







<button class="save" onclick="saveProfile()">


💾 Save Profile


</button>





<button class="skip" onclick="skipProfile()">



⏭ Skip


</button>







<div class="message" id="msg">

✅ Profile Saved Successfully


</div>



</div>









<script>





// LOAD SAVED PROFILE



window.onload=function(){



let profile=

JSON.parse(

localStorage.getItem("profile")

);





if(profile){



document.getElementById("name").value=

profile.name || "";



document.getElementById("phone").value=

profile.phone || "";



document.getElementById("email").value=

profile.email || "";



document.getElementById("address").value=

profile.address || "";



}



}









// SAVE PROFILE



function saveProfile(){



let data={



name:

document.getElementById("name").value.trim(),




phone:

document.getElementById("phone").value.trim(),




email:

document.getElementById("email").value.trim(),




address:

document.getElementById("address").value.trim()



};








if(data.name=="" || data.phone=="" || data.address==""){



alert(

"Please enter Name, Phone and Address"

);



return;


}







localStorage.setItem(

"profile",

JSON.stringify(data)

);






localStorage.removeItem(

"profileSkipped"

);







document.getElementById("msg").style.display="block";







setTimeout(()=>{


window.location.href="customer-dashboard.html";


},1000);



}









// SKIP PROFILE



function skipProfile(){



localStorage.setItem(

"profileSkipped",

"yes"

);



window.location.href="customer-dashboard.html";



}




</script>



</body>

</html>
