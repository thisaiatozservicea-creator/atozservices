<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Already In App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

margin:0;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(
135deg,
#020617,
#334155
);

padding:20px;

}


/* CARD */

.card{

width:100%;
max-width:360px;

background:white;

border-radius:30px;

padding:30px 20px;

text-align:center;

box-shadow:
0 20px 50px rgba(0,0,0,.35);

animation:show .5s ease;

}


/* ICON */

.icon{

width:90px;
height:90px;

margin:auto;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:45px;

background:#fef3c7;

}



/* TITLE */

h1{

font-size:22px;

font-weight:800;

color:#111827;

margin:20px 0 10px;

}



/* TEXT */

p{

font-size:14px;

color:#64748b;

line-height:1.6;

}



/* BUTTON */

button{

width:100%;

border:none;

padding:14px;

margin-top:20px;

border-radius:15px;

font-size:15px;

font-weight:700;

background:#111827;

color:white;

cursor:pointer;

}



button:hover{

background:#f59e0b;

}




.small{

margin-top:15px;

font-size:12px;

color:#94a3b8;

}



/* ANIMATION */


@keyframes show{

from{

opacity:0;

transform:scale(.7);

}

to{

opacity:1;

transform:scale(1);

}

}



@media(max-width:500px){

.card{

padding:25px 18px;

border-radius:25px;

}


h1{

font-size:20px;

}


p{

font-size:12px;

}

}


</style>


</head>


<body>


<div class="card">


<div class="icon">

📱

</div>


<h1>

You Are Already In App

</h1>


<p>

This page is already opened inside the A TO Z Services mobile application.

You don't need to download the app again.

</p>


<button onclick="goHome()">

🏠 Go To Home

</button>


<div class="small">

A TO Z Services • Official App

</div>


</div>




<script>


function goHome(){

window.location.href="index.html";

}


</script>


</body>

</html>
