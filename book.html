<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
A TO Z Services - Booking
</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">


<style>


*{

box-sizing:border-box;
font-family:'Poppins',sans-serif;

}



body{

margin:0;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:15px;


background:

linear-gradient(
135deg,
#fff7cc,
#dbeafe
);

}




/* MAIN BOOKING CARD */


.booking-card{


width:100%;

max-width:420px;

background:

rgba(255,255,255,.75);


backdrop-filter:blur(15px);


border:

1px solid rgba(255,255,255,.8);


border-radius:28px;


padding:25px;


box-shadow:

0 20px 50px rgba(0,0,0,.18);


animation:show .5s ease;


}



@keyframes show{


from{

opacity:0;

transform:translateY(30px);

}


to{

opacity:1;

transform:translateY(0);

}


}





.logo{


text-align:center;

font-size:22px;

font-weight:900;

color:#f59e0b;

}



h2{


text-align:center;

margin:10px 0;

font-size:25px;

font-weight:800;

color:#111827;


}



.sub{


text-align:center;

font-size:12px;

color:#64748b;

margin-bottom:20px;


}






label{


display:block;

font-size:12px;

font-weight:700;

color:#374151;

margin-top:10px;


}





input,
textarea{


width:100%;

padding:12px;

margin-top:5px;

border:none;

outline:none;

border-radius:14px;


background:white;


font-size:13px;


box-shadow:

0 5px 15px rgba(0,0,0,.08);


}



input:focus,
textarea:focus{


box-shadow:

0 0 0 2px #facc15;


}




textarea{


height:80px;

resize:none;


}







.date-row{


display:flex;

gap:10px;


}



.date-row input{


width:50%;


}








button{


width:100%;

padding:13px;


margin-top:15px;


border:none;

border-radius:15px;


background:

linear-gradient(
135deg,
#facc15,
#f59e0b
);


font-size:14px;

font-weight:800;


cursor:pointer;


transition:.3s;


}



button:hover{


transform:translateY(-3px);


}




.secondary{


background:#111827;

color:white;


}






.loader{


display:none;

text-align:center;

margin-top:15px;

font-size:13px;

font-weight:700;

color:#f59e0b;


}





/* SUCCESS POPUP */


.success{


display:none;

position:fixed;

inset:0;


background:

rgba(0,0,0,.5);


backdrop-filter:blur(8px);


justify-content:center;

align-items:center;


z-index:9999;


}



.success-box{


width:350px;

max-width:90%;

background:white;


padding:25px;


border-radius:25px;


text-align:center;


animation:pop .4s;


}



@keyframes pop{


from{

transform:scale(.5);

opacity:0;

}


to{

transform:scale(1);

opacity:1;

}


}





.success-icon{


width:65px;

height:65px;


margin:auto;


border-radius:50%;


background:#16a34a;


color:white;


font-size:35px;


display:flex;


align-items:center;


justify-content:center;


}





.success-box h3{


font-size:22px;

color:#166534;


}



.details{


background:#f8fafc;

padding:12px;

border-radius:15px;


text-align:left;

font-size:12px;


margin-top:15px;


}







/* MOBILE SMALL */


@media(max-width:500px){


body{


padding:8px;

align-items:flex-start;


}




.booking-card{


max-width:320px;

margin:15px auto;

padding:16px;


border-radius:20px;


}



.logo{


font-size:17px;


}



h2{


font-size:19px;


}



.sub{


font-size:11px;

}



label{


font-size:10px;


}



input,
textarea{


font-size:12px;

padding:9px;


border-radius:10px;


}



textarea{


height:55px;


}



button{


padding:10px;

font-size:12px;


}




.success-box{


width:280px;

padding:18px;


}



.success-icon{


width:45px;

height:45px;

font-size:25px;


}



.success-box h3{


font-size:17px;


}



.details{


font-size:10px;


}



}



</style>

</head>

<div class="booking-card">


<div class="logo">

🛠 A TO Z Services

</div>



<h2>

Service Booking

</h2>



<p class="sub">

Fast & Trusted Doorstep Service

</p>





<label>

Selected Service

</label>


<input

id="serviceName"

readonly

placeholder="Selected Service">






<label>

Customer Name *

</label>


<input

id="customerName"

placeholder="👤 Enter your name">






<label>

Phone Number *

</label>


<input

id="customerPhone"

type="tel"

placeholder="📞 Enter mobile number">






<label>

Email (Optional)

</label>


<input

id="customerEmail"

type="email"

placeholder="📧 Enter email">






<label>

Address *

</label>


<textarea

id="customerAddress"

placeholder="🏠 Enter your address"></textarea>








<label>

Your Available Date & Time

</label>





<div class="date-row">


<input

type="date"

id="date">





<input

type="time"

id="time">


</div>






<button onclick="setDateTime()">

⏰ Set Available Date & Time

</button>







<input

id="datetime"

readonly

placeholder="Available date and time">







<label>

Issue Details

</label>



<textarea

id="issue"

placeholder="📝 Describe your problem"></textarea>








<button onclick="bookService()">

✅ Confirm Booking

</button>






<button class="secondary" onclick="goDashboard()">

🏠 Customer Dashboard

</button>






<div class="loader" id="loader">

⏳ Processing Booking...

</div>



</div>








<!-- SUCCESS POPUP -->


<div class="success" id="success">



<div class="success-box">



<div class="success-icon">

✓

</div>





<h3>

Booking Confirmed

</h3>




<p>

Thank you for choosing

<b>A TO Z Services</b>

</p>







<div class="details">


<p>

🆔 Booking ID:

<b id="confirmId"></b>

</p>




<p>

🛠 Service:

<b id="confirmService"></b>

</p>




<p>

👤 Customer:

<b id="confirmName"></b>

</p>




<p>

📅 Date:

<b id="confirmDate"></b>

</p>



</div>







<button class="secondary" onclick="goDashboard()">

Go Customer Dashboard

</button>






</div>


</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>


<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>




<script>


// ===============================
// EMAIL JS INIT
// ===============================


emailjs.init(
"JcZ8BFDctQJNYgEK_"
);






// ===============================
// FIREBASE
// ===============================


const firebaseConfig = {




authDomain:"notificatin.firebaseapp.com",

databaseURL:"https://notificatin-default-rtdb.firebaseio.com",

projectId:"notificatin",

storageBucket:"notificatin.firebasestorage.app",

messagingSenderId:"254649810281",

appId:"1:254649810281:web:bc659be4ac62712e57d1f8"


};






if(!firebase.apps.length){

firebase.initializeApp(firebaseConfig);

}



const db = firebase.database();









// ===============================
// LOAD PROFILE + SERVICE
// ===============================


window.onload=function(){



// GET SERVICE FROM DASHBOARD


let service = localStorage.getItem(
"selectedService"
);





if(service){


document.getElementById(
"serviceName"
).value = service;


}

else{


document.getElementById(
"serviceName"
).value =
"General Service";


}







// GET PROFILE


let profile = JSON.parse(

localStorage.getItem("profile")

);






if(profile){



document.getElementById(
"customerName"
).value =

profile.name || "";





document.getElementById(
"customerPhone"
).value =

profile.phone || "";





document.getElementById(
"customerEmail"
).value =

profile.email || "";





document.getElementById(
"customerAddress"
).value =

profile.address || "";



}



};









// ===============================
// DATE TIME BUTTON
// ===============================


function setDateTime(){



let date = document.getElementById(
"date"
).value;




let time = document.getElementById(
"time"
).value;






if(!date || !time){


alert(
"Please select available date and time"
);


return;


}







let timeFormat = new Date(

"2000-01-01T"+time

).toLocaleTimeString([],{

hour:"2-digit",

minute:"2-digit"

});







document.getElementById(
"datetime"
).value =


date+" | "+timeFormat;



}









// ===============================
// BOOKING FUNCTION
// ===============================


async function bookService(){





let loader=document.getElementById(
"loader"
);


loader.style.display="block";







let booking={



bookingId:

"BK"+Date.now(),






service:

document.getElementById(
"serviceName"
).value,







name:

document.getElementById(
"customerName"
).value.trim(),






phone:

document.getElementById(
"customerPhone"
).value.trim(),






email:

document.getElementById(
"customerEmail"
).value.trim(),






address:

document.getElementById(
"customerAddress"
).value.trim(),






datetime:

document.getElementById(
"datetime"
).value,






issue:

document.getElementById(
"issue"
).value.trim(),






status:

"NEW",






createdAt:

new Date().toLocaleString()



};









if(


!booking.name ||

!booking.phone ||

!booking.address ||

!booking.datetime


){



alert(
"Please fill all required fields"
);


loader.style.display="none";


return;


}









if(!/^[0-9]{10}$/.test(booking.phone)){



alert(
"Enter valid 10 digit phone number"
);



loader.style.display="none";


return;


}









try{





// SAVE FIREBASE


await db.ref(
"bookings"
).push(
booking
);







// SEND EMAIL


try{


await emailjs.send(


"service_74bvd2a",


"template_s06q509",



{


name:booking.name,


phone:booking.phone,


email:booking.email,


address:booking.address,


service:booking.service,


datetime:booking.datetime,


issue:booking.issue



}



);



console.log(
"Email Sent"
);



}

catch(err){


console.log(
"Email Error",
err
);


}








showSuccess(

booking.bookingId,

booking.service,

booking.name,

booking.datetime

);





loader.style.display="none";






}

catch(error){



loader.style.display="none";



alert(

"Booking Failed : "+error.message

);



}





}






// ===============================
// SUCCESS POPUP
// ===============================


function showSuccess(

id,

service,

name,

date

){



document.getElementById(
"confirmId"
).innerText=id;




document.getElementById(
"confirmService"
).innerText=service;




document.getElementById(
"confirmName"
).innerText=name;




document.getElementById(
"confirmDate"
).innerText=date;






document.getElementById(
"success"
).style.display="flex";



}









// ===============================
// GO CUSTOMER DASHBOARD
// ===============================


function goDashboard(){



window.location.href=

"customer-dashboard.html";



}







</script>



</body>

</html>
